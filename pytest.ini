[pytest]
# Root directory for tests
testpaths = tests

# Python files pytest should collect
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers for custom test organization
markers =
    unit: Unit tests
    integration: Integration tests

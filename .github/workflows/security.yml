name: Security Checks

on:
  pull_request:
  push:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  vulnerability-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/python-setup
      - name: Run security audit
        run: pip-audit

  security-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/python-setup


      - name: Run Bandit
        run: |
          bandit -r src config scripts -x .venv,venv,build,dist,.pytest_cache,.ruff_cache -ll
          bandit app.py -ll

name: CI

on:
  pull_request:
    branches:
      - develop
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-source-branch:
    runs-on: ubuntu-latest
    if: github.base_ref == 'main'
    steps:
      - name: Check PR is from develop
        run: |
          if [ "${{ github.head_ref }}" != "develop" ]; then
            echo "Error: PRs to main must come from develop, not '${{ github.head_ref }}'."
            exit 1
          fi

  check-bump-label:
    runs-on: ubuntu-latest
    if: github.base_ref == 'develop'
    steps:
      - uses: actions/checkout@v4
      - name: Check bump label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LABELS=$(gh pr view ${{ github.event.pull_request.number }} \
            --json labels \
            --jq '.labels[].name')

          BUMP_LABELS=$(echo "$LABELS" | grep -E '^bump:(major|minor|patch)$' || true)
          BUMP_COUNT=$(echo "$BUMP_LABELS" | grep -c . || true)

          if [ "$BUMP_COUNT" -eq 1 ]; then
            echo "Bump label found: $BUMP_LABELS"
          elif [ "$BUMP_COUNT" -eq 0 ]; then
            echo "Error: PR to develop requires exactly one of: bump:major, bump:minor, bump:patch"
            exit 1
          else
            echo "Error: PR to develop has multiple bump labels. Use exactly one of: bump:major, bump:minor, bump:patch"
            echo "$BUMP_LABELS"
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/python-setup
      - name: Run linter
        run: ruff check src scripts tests streamlit_pages streamlit_utils streamlit_app.py

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/python-setup
      - name: Run type check
        run: mypy src

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/python-setup
      - name: Run tests with coverage
        run: pytest -v --tb=short --cov=src --cov-report=term

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/python-setup
      - name: Run security audit
        run: pip-audit

  vulnerability-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/python-setup
      - name: Run Bandit
        run: |
          bandit -r src scripts streamlit_pages streamlit_utils streamlit_app.py -x .venv,venv,build,dist,.pytest_cache,.ruff_cache -ll
